{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="{% static 'api/style.css' %}">
</head>

<body>

<div class="register-container">

    <h2>Login</h2>

    <input id="username" type="text" placeholder="Username">

    <input id="password" type="password" placeholder="Password">

    <button class="register-btn" onclick="login()">Login</button>

    <p id="message"></p>

</div>

<script type="module" src="{% static 'api/login.js' %}"></script>

</body>
</html>
